<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/src/assets/images/1.png">
  <title>Gestionar cursos | Taudux</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
  <link rel="stylesheet" href="/src/app/shared/floating-menu/floating-menu.css">
  <link rel="stylesheet" href="/src/app/shared/navbar/navbar.css">
  <link rel="stylesheet" href="/src/app/shared/button/button.css">
  <link rel="stylesheet" href="/src/app/shared/panel/panel.css">
  <link rel="stylesheet" href="/src/app/shared/field/field.css">
  <link rel="stylesheet" href="/src/app/shared/toast/toast.css">
  <link rel="stylesheet" href="/src/app/features/courses/cursos.css">
</head>

<body class="courses courses--auth-pending">
  <nav class="navbar navbar--scrolled">
    <a href="/index.html" class="navbar__brand">
      <img src="/src/assets/images/logo-horizontal.png" alt="Taudux logo" class="navbar__logo">
    </a>
    <div class="navbar__links navbar__links--visible navbar__links--simple">
      <a href="#" id="accessBtn" class="navbar__link button button--access">Salir</a>
    </div>
  </nav>

  <main class="courses__main">
    <div class="courses__container">
      <header class="courses__header">
        <h1 class="courses__title">Gestionar cursos</h1>
        <p class="courses__intro">
          Publica, edita o elimina los cursos que verán los usuarios.
        </p>
      </header>

      <section class="courses__admin-panel panel panel--spacious">
        <h2 class="courses__subtitle">Publicar un curso</h2>
        <form class="courses__form" id="cursoForm">
          <div class="courses__form-row">
            <input class="field" id="cursoTitulo" type="text" placeholder="Título" required>
            <select class="field" id="cursoCategoria" required>
              <option value="" disabled selected>Categoría</option>
              <option value="Inteligencia artificial">Inteligencia artificial</option>
              <option value="Análisis de datos">Análisis de datos</option>
            </select>
          </div>
          <textarea class="field field--textarea" id="cursoDescripcion" placeholder="Descripción"></textarea>
          <div class="courses__form-row">
            <select class="field" id="cursoModalidad" required>
              <option value="" disabled selected>Modalidad</option>
              <option value="presencial">Presencial</option>
              <option value="en_linea">En línea</option>
            </select>
            <input class="field" id="cursoHora" type="time" required>
            <input class="field" id="cursoDuracion" type="number" step="0.5" min="0.5" placeholder="Duración (horas)" required>
          </div>
          <div class="courses__form-row">
            <input class="field" id="cursoFechaInicio" type="date" required>
            <input class="field" id="cursoFechaFin" type="date" required>
            <label class="field courses__checkbox">
              <input type="checkbox" id="cursoProximamente"> Próximamente
            </label>
          </div>
          <fieldset class="courses__dias">
            <legend>Días de la semana</legend>
            <label class="courses__dia"><input type="checkbox" value="lun"> Lun</label>
            <label class="courses__dia"><input type="checkbox" value="mar"> Mar</label>
            <label class="courses__dia"><input type="checkbox" value="mie"> Mié</label>
            <label class="courses__dia"><input type="checkbox" value="jue"> Jue</label>
            <label class="courses__dia"><input type="checkbox" value="vie"> Vie</label>
            <label class="courses__dia"><input type="checkbox" value="sab"> Sáb</label>
            <label class="courses__dia"><input type="checkbox" value="dom"> Dom</label>
          </fieldset>
          <div class="courses__form-row">
            <input class="field" id="cursoCupo" type="number" min="1" placeholder="Cupo máximo (opcional)">
            <input class="field" id="cursoCosto" type="number" step="0.01" min="0" placeholder="Costo en MXN (opcional)">
          </div>
          <input class="field" id="cursoInstructor" type="text" placeholder="Impartido por" required>
          <input class="field" id="cursoImagen" type="url" placeholder="URL de imagen (opcional, https://...)">
          <div class="courses__form-actions">
            <button class="button button--outline" type="button" id="cursoCancelar">Cancelar</button>
            <button class="button button--glow" type="submit">Publicar curso</button>
          </div>
        </form>
      </section>

      <section class="courses__list" id="cursosLista"></section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/app/core/supabase/supabase-client.js"></script>
  <script src="/src/app/core/auth/auth.service.js"></script>
  <script src="/src/app/core/cursos/cursos.service.js"></script>
  <script src="/src/app/shared/navbar/navbar.js"></script>
  <script src="/src/app/shared/toast/toast.js"></script>
  <script src="/src/app/features/courses/gestionar-cursos.js"></script>
</body>

</html>
