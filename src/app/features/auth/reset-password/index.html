<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/src/assets/images/1.png">
  <title>Nueva contraseña | Taudux</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
  <link rel="stylesheet" href="/src/app/shared/navbar/navbar.css">
  <link rel="stylesheet" href="/src/app/shared/button/button.css">
  <link rel="stylesheet" href="/src/app/shared/panel/panel.css">
  <link rel="stylesheet" href="/src/app/shared/field/field.css">
  <link rel="stylesheet" href="/src/app/features/auth/auth.css">
</head>

<body>
  <nav class="navbar navbar--scrolled" aria-label="Navegación principal">
    <a href="/index.html" class="navbar__brand">
      <img src="/src/assets/images/logo-horizontal.png" alt="Taudux" class="navbar__logo">
    </a>
  </nav>

  <main class="auth">
    <section class="auth__card panel panel--spacious">
      <div class="auth__section" id="resetLoading">
        <div class="auth__spinner" aria-hidden="true"></div>
        <h1 class="auth__title" id="authTitle">Validando enlace</h1>
        <p class="auth__subtitle">Espera un momento.</p>
      </div>

      <div class="auth__section" id="resetContent" hidden>
        <h1 class="auth__title">Crear nueva contraseña</h1>
        <p class="auth__subtitle">Usa una contraseña segura que no hayas utilizado antes.</p>
        <div class="auth__status" id="authStatus" tabindex="-1" hidden></div>

        <form class="auth__form" id="resetForm" novalidate hidden>
          <div class="auth__field-group">
            <label class="auth__label" for="resetPassword">Nueva contraseña</label>
            <div class="password-field">
              <input type="password" id="resetPassword" class="password-field__input field" autocomplete="new-password" minlength="8" aria-describedby="passwordReqs" required>
              <button type="button" class="password-field__toggle" data-target="resetPassword" aria-label="Mostrar contraseña" aria-pressed="false">
                <svg class="password-field__icon password-field__icon--show" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="password-field__icon password-field__icon--hide" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22"></path><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.3 20.3 0 0 1 5.06-5.94"></path></svg>
              </button>
            </div>
          </div>
          <ul class="password-requirements" id="passwordReqs">
            <li class="password-requirements__item" data-req="longitud">Al menos 8 caracteres</li>
            <li class="password-requirements__item" data-req="mayuscula">Una letra mayúscula</li>
            <li class="password-requirements__item" data-req="minuscula">Una letra minúscula</li>
            <li class="password-requirements__item" data-req="digito">Un número</li>
          </ul>
          <div class="auth__field-group">
            <label class="auth__label" for="resetPasswordConfirm">Confirmar contraseña</label>
            <div class="password-field">
              <input type="password" id="resetPasswordConfirm" class="password-field__input field" autocomplete="new-password" minlength="8" required>
              <button type="button" class="password-field__toggle" data-target="resetPasswordConfirm" aria-label="Mostrar contraseña" aria-pressed="false">
                <svg class="password-field__icon password-field__icon--show" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="password-field__icon password-field__icon--hide" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22"></path><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.3 20.3 0 0 1 5.06-5.94"></path></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="auth__submit button button--glow" data-loading-text="Guardando…">Guardar contraseña</button>
        </form>

        <div class="auth__actions">
          <a class="auth__link" id="requestNewLink" href="/src/app/features/auth/forgot-password/" hidden>Solicitar un enlace nuevo</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/app/core/supabase/supabase-client.js"></script>
  <script src="/src/app/core/auth/auth.service.js"></script>
  <script src="/src/app/features/auth/auth-ui.js"></script>
  <script src="/src/app/features/auth/reset-password/reset-password.js"></script>
</body>

</html>
